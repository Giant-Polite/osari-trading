name: Ping Supabase to Prevent Pause

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Runs at 9 AM UTC every Monday and Thursday
  workflow_dispatch:      # Allows manual trigger

# This section is necessary to allow the keepalive action to talk to GitHub
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: curl -f https://${{ secrets.VERCEL_URL }}/api/ping

      # This is the "Step 1" fix that resets the 60-day timer
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true

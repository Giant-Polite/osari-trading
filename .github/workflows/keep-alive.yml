name: Ping Supabase to Prevent Pause

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

permissions:
  contents: read    # <--- Added this to fix "Repository access blocked"
  actions: write     # <--- Required for the keepalive step to work

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          if [ -z "${{ secrets.VERCEL_URL }}" ]; then
            echo "Error: VERCEL_URL secret is not set!"
            exit 1
          fi
          curl -f https://${{ secrets.VERCEL_URL }}/api/ping

      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
